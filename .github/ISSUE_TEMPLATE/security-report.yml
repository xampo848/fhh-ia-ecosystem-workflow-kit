name: Security Report (non-sensitive)
description: Track security findings that are safe to discuss publicly.
title: "[security] "
labels:
  - security
body:
  - type: markdown
    attributes:
      value: |
        For sensitive vulnerabilities, do not use public issues. Follow SECURITY.md.
  - type: textarea
    id: affected
    attributes:
      label: Affected component/path
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Security impact
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
    validations:
      required: true
